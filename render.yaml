services:
  - type: web
    name: roboflow-upload-service
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app
    envVars:
      - key: ROBOFLOW_PRIVATE_API_KEY
        sync: false
      - key: ROBOFLOW_WORKSPACE
        sync: false
      - key: ROBOFLOW_PROJECT
        sync: false
